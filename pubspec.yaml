name: invite
description: "A Flutter app for creating professional invitation cards."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  screenshot: ^3.0.0
  uuid: ^4.5.1
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.1.4
  google_mobile_ads: ^5.3.0
  flutter_colorpicker: ^1.1.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.0
  in_app_purchase: ^3.2.0
  google_fonts: ^6.2.1
  app_tracking_transparency: ^2.0.6+1
  url_launcher: ^6.3.1
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#7C4DFF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  remove_alpha_ios: true