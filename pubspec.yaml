name: invite
description: "A Flutter app for creating professional invitation cards."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  screenshot: ^3.0.0
  uuid: ^4.5.1
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.1.4
  google_mobile_ads: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
